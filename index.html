<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우라기와 에리 - 나무위키 스타일 프로필</title>
    <style>
        /* 기본 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #373a3c;
            background-color: #ffffff;
            padding: 15px;
        }

        /* 메인 컨테이너 */
        .wiki-container {
            max-width: 768px;
            margin: 0 auto;
        }

        /* 문서 제목 */
        .wiki-title {
            font-size: 32px;
            font-weight: normal;
            border-bottom: 1px solid #bbb;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        /* 분류 박스 */ 
        .wiki-category-box {
            border: 1px solid #ccc;
            background: #fdfdfd;
            padding: 6px 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .wiki-category-box span { font-weight: bold; }
        .wiki-category-box a { color: #0275d8; text-decoration: none; }

        /* =======================================================
           사멸회유 참가자 둘러보기 틀 (이미지 타이틀 적용)
           ======================================================= */
        .wiki-frame {
            width: 100%;
            border: 2px solid #000000;
            font-size: 13px;
            margin-bottom: 20px;
            background-color: #000000;
        }
        .frame-header {
            background: #000000;
            padding: 10px;
            text-align: center;
        }
        .frame-header img {
            max-width: 100%;
            height: auto;
            max-height: 60px;
            display: block;
            margin: 0 auto;
        }
        .frame-toggle {
            background: #ffffff;
            color: #373a3c;
            text-align: center;
            padding: 5px;
            font-size: 13px;
            border-top: 1px solid #000000;
            border-bottom: 1px solid #000000;
            cursor: pointer;
            user-select: none;
        }
        .frame-body-content {
            display: block;
            background: #ffffff;
        }
        .frame-colony-title {
            background: #000000;
            color: #ffdf00;
            text-align: center;
            padding: 6px;
            font-weight: bold;
            font-size: 13px;
            border-top: 1px solid #444;
            border-bottom: 1px solid #444;
        }
        .frame-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
        }
        .frame-table th {
            background: #111111;
            color: #ffffff;
            padding: 8px 4px;
            border: 1px solid #000000;
            font-size: 12px;
            width: 90px;
            font-weight: normal;
            text-align: center;
        }
        .frame-table td {
            background: #ffffff;
            padding: 8px 12px;
            border: 1px solid #000000;
            font-size: 13px;
            color: #373a3c;
            line-height: 1.5;
        }
        
        .color-blue { color: #0033cc; font-weight: bold; }
        .color-green { color: #006633; font-weight: bold; }
        .color-red { color: #990000; font-weight: bold; }
        .color-purple { color: #551a8b; font-weight: bold; }
        .color-gray { color: #555555; }

        .frame-footer {
            background: #ffffff;
            padding: 10px;
            font-size: 12px;
            border-top: 1px solid #000000;
            text-align: center;
            color: #000000;
            line-height: 1.6;
        }

        /* 캐릭터 프로필 인포박스 - 색상 #D9347A 적용 */
        .infobox-frame {
            border: 2px solid #D9347A;
            padding: 3px;
            background-color: #ffffff;
            margin-bottom: 25px;
            width: 100%;
        }
        .infobox {
            width: 100%;
            border: 1px solid #dbdbdb; 
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
        }
        .infobox th, .infobox td {
            border: 1px solid #dbdbdb;
            padding: 9px;
        }
        .infobox .title-cell {
            background-color: #D9347A; 
            color: #ffffff;
            font-size: 20px;
            text-align: center;
            padding: 12px;
        }
        .infobox .title-cell .sub-lang {
            font-size: 12px;
            display: block;
            margin-top: 4px;
            color: #fce4ec;
        }
        .infobox .image-cell {
            text-align: center;
            padding: 0;
            background: #f9f9f9;
        }
        .infobox .image-cell img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .infobox .attr-name {
            background-color: #D9347A !important;
            color: #ffffff !important;
            font-weight: bold;
            width: 30%;
            text-align: center;
        }

        /* 대사/인용 상자 - 색상 #D9347A 적용 */
        .quote-box {
            border: 1px solid #ccc;
            border-left: 5px solid #D9347A; 
            background-color: #fdf2f6;
            padding: 15px;
            margin: 5px 0 15px 0;
        }
        .quote-line-main { font-size: 16px; font-weight: bold; color: #111; line-height: 1.5; }
        .quote-line-sub { font-size: 13px; font-weight: normal; color: #555; line-height: 1.5; margin-top: 4px; }

        /* =======================================================
           접기/펼치기 및 스포일러 틀 스타일
           ======================================================= */
        .section-wrapper {
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }
        .section-toggle-btn {
            background-color: #f5f5f5;
            padding: 10px 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-toggle-btn::after {
            content: '[ 펼치기 / 접기 ]';
            font-size: 12px;
            color: #555;
            font-weight: normal;
        }
        .section-body {
            padding: 15px;
            border-top: 1px solid #ccc;
            display: block; /* 기본은 펼쳐진 상태 */
        }
        
        /* 작중 행적 스포일러 전용 스타일 (기본 접힘) */
        .spoiler-wrapper {
            border: 2px solid #fa5252;
        }
        .spoiler-btn {
            background-color: #fff5f5;
            color: #e03131;
        }
        .spoiler-btn::after {
            content: '[ 내용 보기 ]';
            color: #e03131;
        }
        .spoiler-warning-text {
            font-size: 13px;
            color: #e03131;
            font-weight: normal;
            margin-top: 2px;
        }
        .spoiler-body {
            display: none; /* 작중 행적만 기본 숨김 처리 */
            background-color: #fff;
        }

        /* 본문 내부 스타일 */
        .wiki-text p { margin-bottom: 14px; text-align: justify; font-size: 14.5px; line-height: 1.7; }
        .etc-items { padding-left: 15px; margin-bottom: 15px; }
        .etc-items li { margin-bottom: 8px; font-size: 14.5px; }
        .coral-tag { background-color: #fdf2f6; color: #D9347A; padding: 2px 6px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .footnote { color: #0275d8; font-size: 11px; vertical-align: super; cursor: pointer; font-weight: bold; padding: 0 1px; }
        .footnote-popup { display: none; position: absolute; background: #373a3c; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .loop-box { margin-top: 15px; border-top: 2px solid #ccc; padding-top: 15px; }
        .loop-list { list-style: none; padding-left: 5px; }
        .loop-list li { font-size: 13.5px; margin-bottom: 6px; color: #555; }
        .loop-num { color: #0275d8; font-weight: bold; margin-right: 5px; }
    </style>
</head>
